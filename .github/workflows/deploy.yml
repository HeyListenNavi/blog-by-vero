name: Nixpacks Build & Push

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lowercase repo name
        id: prep
        run: echo "repo_lower=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push with Nixpacks Action
        uses: iloveitaly/github-action-nixpacks@main
        with:
          push: true
          platforms: "linux/arm64"
          tags: "ghcr.io/${{ steps.prep.outputs.repo_lower }}:latest"

      - name: Trigger Easypanel Deploy
        run: |
          curl -X POST "${{ secrets.EASYPANEL_WEBHOOK_URL }}"
